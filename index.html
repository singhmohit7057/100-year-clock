<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8">
  <title>100 Year Clock Wheel</title>
  <link rel="stylesheet" href="./style.css">

</head>
<body>
  <h1 class="page-title">🕰️ 100 Year Clock ⏳</h1>
<!-- partial:index.partial.html -->
<div class="clock" data-date="2024-12-25">
  <div>
    <div data-clock="years" data-numbers="101" class="clock-face"></div>
  </div>
  <div>
    <div data-clock="seconds" data-numbers="60" class="clock-face"></div>
  </div>
  <div>
    <div data-clock="minutes" data-numbers="60" class="clock-face"></div>
  </div>
  <div>
    <div data-clock="hours" data-numbers="24" class="clock-face"></div>
  </div>
  <div>
    <div data-clock="days" data-numbers="31" class="clock-face"></div>
  </div>
  <div>
    <div data-clock="months" data-numbers="12" class="clock-face"></div>
  </div>

  <div>
    <div data-clock="day-names" data-numbers="7" class="clock-face"></div>
  </div>
  <button type="button" id="current-lang" class="current-lang-display">en</button>
</div>

<!-- Time Separator -->
<div class="time-separator sep1">:</div>
<div class="time-separator sep2">:</div>

<!-- language -->
<dialog id="language-dialog">
  <button type="button" id="btn-dialog-close" class="btn-dialog-close">&#10005;</button>

  <div id="language-options" class="language-options">
    <div id="language-title" class="language-title"></div>
  </div>

</dialog>

<!-- audio -->
<audio id="clock-audio" src="clockticking.mp3" loop preload="auto"></audio>

<button id="speaker-toggle" class="speaker-btn">
🔊
</button>

<div class="instruction">
   *Click the center to change language
</div>

<!-- partial -->
  <script  src="./script.js"></script>

</body>
</html>
